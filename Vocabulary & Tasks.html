        // Speech Synthesis Function
        function playAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // stop any current speech
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US'; // Uses US English for clear pronunciation
                msg.rate = 0.9;     // Slightly slower for clarity
                window.speechSynthesis.speak(msg);
            } else {
                alert("Sorry, your browser doesn't support text-to-speech.");
            }
        }

        const vocabProgramKey = "ilets:vocab-program:start-date";
        const vocabDayCompletionPrefix = "ilets:vocab-day:";

        function getLocalMidnight(date) {
            return new Date(date.getFullYear(), date.getMonth(), date.getDate());
        }

        function formatDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");

            return year + "-" + month + "-" + day;
        }

        function parseDateKey(value) {
            const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);

            if (!match) {
                return null;
            }

            return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        }

        function getConfiguredStartDate() {
            return parseDateKey(document.body.dataset.vocabStartDate);
        }

        function readProgramStartDate() {
            try {
                return parseDateKey(localStorage.getItem(vocabProgramKey));
            } catch (error) {
                return null;
            }
        }

        function writeProgramStartDate(value) {
            try {
                localStorage.setItem(vocabProgramKey, formatDateKey(value));
            } catch (error) {
                return;
            }
        }

        function getCompletionKey(dayNumber) {
            return vocabDayCompletionPrefix + String(dayNumber) + ":completed";
        }

        function readDayCompletion(dayNumber) {
            try {
                return localStorage.getItem(getCompletionKey(dayNumber)) === "true";
            } catch (error) {
                return false;
            }
        }

        function writeDayCompletion(dayNumber) {
            try {
                localStorage.setItem(getCompletionKey(dayNumber), "true");
            } catch (error) {
                return;
            }
        }

        function addDays(date, offset) {
            const result = new Date(date);
            result.setDate(result.getDate() + offset);
            return getLocalMidnight(result);
        }

        function formatDisplayDate(date) {
            return new Intl.DateTimeFormat("en-US", {
                weekday: "long",
                month: "long",
                day: "numeric",
                year: "numeric"
            }).format(date);
        }

        function getProgramState(totalDays) {
            const today = getLocalMidnight(new Date());
            const configuredStartDate = getConfiguredStartDate();
            let startDate = configuredStartDate || readProgramStartDate();

            if (!startDate || startDate.getTime() > today.getTime()) {
                startDate = configuredStartDate || today;

                if (!configuredStartDate) {
                    writeProgramStartDate(startDate);
                }
            }

            const dayDifference = Math.floor(
                (today.getTime() - startDate.getTime()) / 86400000
            );
            const activeDayNumber = Math.max(1, Math.min(totalDays, dayDifference + 1));

            return {
                today: today,
                startDate: startDate,
                activeDayNumber: activeDayNumber
            };
        }

            const hashDayMatch = window.location.hash.match(/day-(\d+)/i);

            if (hashDayMatch) {
                const hashDay = Number(hashDayMatch[1]);

                if (Number.isFinite(hashDay) && hashDay >= 1 && hashDay <= lessonData.length) {
                    return hashDay;
                }
            }

            const legacySlideMatch = window.location.hash.match(/slide-(\d+)/i);

            if (legacySlideMatch) {
                const slideNumber = Number(legacySlideMatch[1]) - 1;

                if (Number.isFinite(slideNumber) && slideNumber >= 1 && slideNumber <= lessonData.length) {
                    return slideNumber;
                }
            }

            return null;
        }

        function updatePageFrame(titleText, statusMessage, showDownload) {
            const pageTitle = document.querySelector('header h1');
            const statusText = document.getElementById('lesson-status');
            const downloadButton = document.getElementById('download-btn');

            if (pageTitle) {
                pageTitle.textContent = titleText;
            }

            if (statusText) {
                statusText.textContent = statusMessage;
            }

            if (downloadButton) {
                downloadButton.classList.toggle('hidden', !showDownload);
                downloadButton.disabled = !showDownload;
                downloadButton.setAttribute('aria-hidden', String(!showDownload));
            }
        }

        function buildWordTable(dayData) {
            let tableHTML = `
                <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm bg-white w-full">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead class="sticky top-0 z-20">
                            <tr class="bg-indigo-50 border-b border-slate-200">
                                <th class="p-3 sm:p-4 text-xs sm:text-sm font-bold text-indigo-800 uppercase tracking-wider w-1/5">Word</th>
                                <th class="p-3 sm:p-4 text-xs sm:text-sm font-bold text-indigo-800 uppercase tracking-wider w-1/5">Meaning</th>
                                <th class="p-3 sm:p-4 text-xs sm:text-sm font-bold text-indigo-800 uppercase tracking-wider w-1/4">Collocation</th>
                                <th class="p-3 sm:p-4 text-xs sm:text-sm font-bold text-indigo-800 uppercase tracking-wider">Example</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
            `;

            dayData.words.forEach(wordObj => {
                const [word, turkish, collocation, colTR, example, exTR] = wordObj;
                tableHTML += `
                            <tr class="hover:bg-slate-50 transition-colors group">
                                <td class="p-3 sm:p-4 align-top">
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-indigo-700 text-base sm:text-lg">${word}</span>
                                        <button onclick="playAudio('${word.replace(/'/g, "\\'")}')" class="text-indigo-400 hover:text-indigo-600 bg-indigo-50 hover:bg-indigo-100 w-7 h-7 rounded-full flex items-center justify-center transition-colors focus:outline-none" title="Listen">
                                            <i class="fas fa-volume-up text-xs"></i>
                                        </button>
                                    </div>
                                </td>
                                <td class="p-3 sm:p-4 align-top">
                                    <span class="text-sm font-bold text-slate-600">${turkish}</span>
                                </td>
                                <td class="p-3 sm:p-4 align-top">
                                    <p class="font-bold text-slate-800 text-sm">${collocation}</p>
                                    <p class="text-xs text-slate-500 mt-1">${colTR}</p>
                                </td>
                                <td class="p-3 sm:p-4 align-top">
                                    <p class="text-sm font-medium text-slate-800 italic">"${example}"</p>
                                    <p class="text-xs text-slate-500 mt-1 italic">${exTR}</p>
                                </td>
                            </tr>
                `;
            });

            tableHTML += `
                        </tbody>
                    </table>
                </div>
            `;

            return tableHTML;
        }

        function renderSelectedDay(dayData, isCompleted) {
            const container = document.getElementById('selected-day-container');
            const tableHTML = buildWordTable(dayData);
            updatePageFrame(
                `Vocabulary & Tasks: ${dayData.title}`,
                isCompleted
                    ? `${dayData.title} is completed and ready to save again as PDF.`
                    : `${dayData.title} is ready to save as PDF.`,
                true
            );

            document.title = `Vocabulary & Tasks - ${dayData.title}`;

            container.innerHTML = `
                <div class="slide active flex-col w-full max-w-5xl mx-auto bg-white rounded-2xl shadow-xl p-4 sm:p-8 z-10 mb-8 mt-2">
                    <div class="flex flex-col gap-4 border-b-2 border-slate-100 pb-4 sm:flex-row sm:items-end sm:justify-between">
                        <div>
                            <p class="text-xs sm:text-sm font-bold text-indigo-500 uppercase tracking-widest mb-1">${dayData.subtitle}</p>
                            <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-800">${dayData.title}</h2>
                        </div>
                        <div class="inline-flex items-center gap-2 rounded-full bg-indigo-50 px-4 py-2 text-sm font-semibold text-indigo-700">
                            <i class="fas fa-language"></i>
                            Daily Vocabulary
                        </div>
                    </div>

                    <div class="mt-6 w-full relative">
                        ${tableHTML}
                    </div>

                    <div class="mt-6 grid grid-cols-1 gap-4 border-t border-slate-200 pt-4 md:grid-cols-2">
                        <div class="bg-blue-50 p-4 sm:p-5 rounded-xl border border-blue-200 shadow-sm relative overflow-hidden flex flex-col">
                            <div class="absolute -right-4 -top-4 text-blue-200 text-6xl opacity-30"><i class="fas fa-pen-nib"></i></div>
                            <h3 class="font-bold text-blue-800 mb-2 flex items-center uppercase tracking-wide text-xs relative z-10"><i class="fas fa-pen-square mr-2"></i>Writing Task</h3>
                            <p class="text-sm text-slate-600 font-medium relative z-10">${dayData.wIntro} <br><span class="text-xs text-slate-500">${dayData.wIntroTR}</span></p>
                            <p class="text-base sm:text-lg font-bold text-blue-900 mt-2 mb-1 relative z-10 leading-snug">${dayData.wTopic}</p>
                            <p class="text-sm text-blue-700/80 font-medium mb-3 relative z-10 leading-snug">${dayData.wTopicTR}</p>
                            <div class="mt-auto">
                                <p class="text-xs font-bold text-blue-600 bg-white inline-block px-2 py-1 rounded shadow-sm relative z-10">${dayData.wRule} <span class="block text-[10px] text-blue-400 font-normal mt-0.5">${dayData.wRuleTR}</span></p>
                            </div>
                        </div>

                        <div class="bg-emerald-50 p-4 sm:p-5 rounded-xl border border-emerald-200 shadow-sm relative overflow-hidden flex flex-col">
                            <div class="absolute -right-4 -top-4 text-emerald-200 text-6xl opacity-30"><i class="fas fa-microphone"></i></div>
                            <h3 class="font-bold text-emerald-800 mb-2 flex items-center uppercase tracking-wide text-xs relative z-10"><i class="fas fa-microphone-alt mr-2"></i>Speaking Task</h3>
                            <p class="text-sm text-slate-600 font-medium relative z-10">${dayData.sIntro} <br><span class="text-xs text-slate-500">${dayData.sIntroTR}</span></p>
                            <p class="text-base sm:text-lg font-bold text-emerald-900 mt-2 mb-1 relative z-10 leading-snug">${dayData.sTopic}</p>
                            <p class="text-sm text-emerald-700/80 font-medium mb-3 relative z-10 leading-snug">${dayData.sTopicTR}</p>
                            <div class="mt-auto">
                                <p class="text-xs font-bold text-emerald-600 bg-white inline-block px-2 py-1 rounded shadow-sm relative z-10">${dayData.sRule} <span class="block text-[10px] text-emerald-400 font-normal mt-0.5">${dayData.sRuleTR}</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLockedDay(requestedDayNumber, programState) {
            const container = document.getElementById('selected-day-container');
            const requestedDayData = lessonData[requestedDayNumber - 1];
            const activeDayData = lessonData[programState.activeDayNumber - 1];
            const unlockDate = addDays(programState.startDate, requestedDayNumber - 1);
            const lockedMessage = `This day will open on ${formatDisplayDate(unlockDate)}.`;

            updatePageFrame(
                `Vocabulary & Tasks: ${requestedDayData.title}`,
                `${requestedDayData.title} is locked today.`,
                false
            );

            document.title = `Vocabulary & Tasks - ${requestedDayData.title}`;

            container.innerHTML = `
                <div class="slide active flex-col w-full max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-5 sm:p-8 z-10 mb-8 mt-2">
                    <div class="rounded-3xl border border-indigo-100 bg-indigo-50/70 p-6 text-center sm:p-8">
                        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-white text-2xl text-indigo-600 shadow-sm">
                            <i class="fas fa-lock"></i>
                        </div>
                        <p class="mt-4 text-xs font-bold uppercase tracking-[0.28em] text-indigo-500">Locked Day</p>
                        <h2 class="mt-3 text-2xl font-black text-slate-900 sm:text-3xl">${requestedDayData.title}</h2>
                        <p class="mt-4 text-base leading-8 text-slate-600">${lockedMessage}</p>
                        <p class="mt-2 text-sm font-semibold text-slate-500">
                            Today's open day is <span class="text-indigo-700">${activeDayData.title}</span>.
                        </p>
                        <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
                            <a href="Vocabulary & Tasks.html?day=${programState.activeDayNumber}" class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white transition-colors hover:bg-indigo-700">
                                <i class="fas fa-unlock"></i>
                                Open Today's Day
                            </a>
                            <a href="index.html" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-600 transition-colors hover:bg-slate-50">
                                <i class="fas fa-arrow-left"></i>
                                Course Home
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        const programState = getProgramState(lessonData.length);
        const requestedDayNumber = getRequestedDayNumber();
        const selectedDayNumber = requestedDayNumber || programState.activeDayNumber;
        let activeRenderableDayNumber = null;

        if (selectedDayNumber <= programState.activeDayNumber) {
            activeRenderableDayNumber = selectedDayNumber;
            renderSelectedDay(
                lessonData[selectedDayNumber - 1],
                readDayCompletion(selectedDayNumber)
            );
        } else {
            renderLockedDay(selectedDayNumber, programState);
        }

        window.addEventListener('afterprint', function () {
            if (activeRenderableDayNumber === null) {
                return;
            }

            writeDayCompletion(activeRenderableDayNumber);
            renderSelectedDay(
                lessonData[activeRenderableDayNumber - 1],
                true
            );
        });

        document.getElementById('download-btn').addEventListener('click', function () {
            if (this.disabled) {
                return;
            }

            window.print();
        });
    </script>
</div>
</body>
</html>
