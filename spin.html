PART 1
[TOPIC] Work
Theme: work_and_business | Difficulty: easy | Frequency: very_common | Band: band_4_5
1. What kind of work do you do?
   Safe answer: I work in civil engineering and architecture. I like this field because it combines practical work with creativity. For example, I enjoy design and planning.
   Better answer: I work in civil engineering and architecture, and this field is very meaningful to me. I like it because it combines technical thinking with creativity, which makes the job more interesting. For example, I enjoy design, planning, and thinking about how a place can be improved in a practical way. I also feel satisfied when I can connect ideas with real results.
2. Why did you choose this job?
   Safe answer: I chose this job because I have liked architecture for a long time. It is interesting for me, and it also matches my future goals.
   Better answer: I chose this field because I have been interested in architecture and design for a long time. I like the idea of creating something useful, not only something that looks good. It also suits my personality because I enjoy both practical thinking and creative work. So overall, it felt like the right path for me.
3. What do you like most about your job?
   Safe answer: What I like most is the creative side. I enjoy thinking about design and improving places in a practical way.
   Better answer: What I like most about my job is the creative side of it. I enjoy thinking about design, structure, and how a place can be improved in a useful way. For me, it is satisfying when a project is both practical and visually strong. That balance between function and creativity is probably the best part.
4. Would you like to continue this job in the future?
   Safe answer: Yes, definitely. I want to continue because this job is meaningful to me and it fits my future plans.
   Better answer: Yes, definitely. I would like to continue in this field because it is strongly connected to both my interests and my long-term goals. I feel that there is always something new to learn in this kind of work, which keeps it interesting. It is also a field where I can grow professionally over time.
5. What skills are important in your job?
   Safe answer: I think planning, creativity, and communication are very important. A person also needs patience and attention to detail.
   Better answer: I think planning, creativity, and communication are very important in my job. A person also needs patience and attention to detail, because even a small mistake can affect the final result. For example, it is not enough to have a good design idea if you cannot explain it clearly to other people. So I would say technical ability and communication are both essential.

[TOPIC] Study
Theme: education_and_skills | Difficulty: easy | Frequency: very_common | Band: band_4_5
1. Are you studying anything at the moment?
   Safe answer: Yes. At the moment, I am mainly focused on improving my English speaking. That is because I need IELTS for my future studies.
   Better answer: Yes, at the moment I am mainly focused on improving my English, especially speaking. The reason is that I need IELTS for my future studies, and speaking is one of the most important areas for me right now. I am trying to practise regularly so I can express my ideas more clearly and naturally. So in my case, English study is my main priority at the moment.
2. Why is English important for you?
   Safe answer: English is important for me because I want to study in Italy. It is also necessary for communication and future opportunities.
   Better answer: English is very important for me because I want to study in Italy and continue with a master’s degree. Without English, it would be much harder to reach that goal. It is also useful beyond university, because it can help with communication, professional opportunities, and confidence in international situations. So overall, it is directly connected to my future.
3. Do you prefer studying alone or with other people?
   Safe answer: I usually prefer studying alone because I can focus better. However, studying with a teacher is helpful when I need correction.
   Better answer: I usually prefer studying alone because I can focus better and work at my own pace. When I study alone, I can repeat things as much as I need without pressure. However, studying with a teacher is also very helpful, especially when I need correction and feedback. So I would say both are useful, but for daily study I prefer being alone.
4. What skill would you like to improve?
   Safe answer: I would like to improve my speaking fluency. Sometimes I know the idea, but I need more practice to say it clearly.
   Better answer: The skill I would most like to improve is my speaking fluency. Sometimes I already know the idea in my mind, but I still need more practice to express it smoothly and naturally. This is especially important for IELTS speaking, because I want to sound clearer and more confident. So for me, speaking is the most important skill to improve now.
5. What helps you learn well?
   Safe answer: Clear explanation and regular practice help me most. For example, when I repeat answers aloud, I remember them better.
   Better answer: Clear explanation and regular practice help me learn best. I think I understand things more easily when the explanation is simple and practical. For example, when I repeat an answer aloud and then get feedback, I can notice my mistakes more clearly. So in my case, active practice works much better than only reading rules.

[TOPIC] Hometown
Theme: places_and_identity | Difficulty: easy | Frequency: very_common | Band: band_4_5
1. What kind of place is your hometown?
   Safe answer: My hometown is not very big, but it feels familiar and comfortable. Daily life there is usually easier and calmer than in a huge city.
   Better answer: My hometown is not extremely big, but it feels familiar and comfortable to me. Daily life there is usually calmer and simpler than in a huge city, which I appreciate. It is the kind of place where people often feel more connected to their surroundings. So overall, I would describe it as familiar, practical, and emotionally important.
2. What do you like most about your hometown?
   Safe answer: What I like most is the feeling of familiarity. I know the place well, so it feels comfortable to me.
   Better answer: What I like most about my hometown is the feeling of familiarity. I know the streets, the atmosphere, and the general rhythm of life there, so it feels comfortable and less stressful. I think that kind of emotional connection matters a lot. So for me, the best thing is not only the place itself, but the feeling it gives me.
3. Has your hometown changed much in recent years?
   Safe answer: Yes, I think it has changed quite a lot. It has become busier and more developed than before.
   Better answer: Yes, I think my hometown has changed quite a lot in recent years. It has become busier and more developed, especially in terms of services and daily facilities. Compared to the past, it feels more active now. In some ways that is positive, although it can also make life feel a little more crowded.
4. Is it a good place for young people?
   Safe answer: I would say yes in some ways. It is comfortable and familiar, but some young people may want more opportunities.
   Better answer: I would say it is a good place in some ways, but not in every way. It can feel comfortable, safe, and familiar, which is important for many young people. However, some may want more educational or career opportunities, especially if they have ambitious future goals. So I think it depends on the person.
5. Do you think you will live there in the future?
   Safe answer: I am not completely sure. My future plans may take me somewhere else, but my hometown will always be important to me.
   Better answer: I am not completely sure whether I will live there in the future, because my study and career plans may take me somewhere else. However, I think my hometown will always remain emotionally important to me. Even if I move away for study or work, I will still feel connected to it. So overall, I may not stay there permanently, but it will always matter to me.

    async function fetchGoogleTranslation(text, signal) {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=tr&dt=t&q=${encodeURIComponent(text)}`;
      const response = await fetch(url, { signal });
      if (!response.ok) throw new Error(`Google Translate failed with ${response.status}`);
      const payload = await response.json();
      const translated = Array.isArray(payload?.[0])
        ? payload[0].map((chunk) => (Array.isArray(chunk) ? chunk[0] : "")).join("")
        : "";
      return cleanupTranslation(translated);
    }

    async function fetchMyMemoryTranslation(text, signal) {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|tr`;
      const response = await fetch(url, { signal });
      if (!response.ok) throw new Error(`MyMemory failed with ${response.status}`);
      const payload = await response.json();
      const translated = payload?.responseData?.translatedText || "";
      return cleanupTranslation(
        translated.replace(/&#39;/g, "'").replace(/&quot;/g, '"')
      );
    }

    function getImmediateTranslation(text) {
      const cached = getTranslationEntry(text);
      if (cached?.text) return cached.text;

      const t = normalizeWhitespace(text);
      if (!t) return "";

      const map = [
        [/^Describe (.+)\.$/i, (m, rest) => `${rest} anlatın.`],
        [/^Do you (.+)\?$/i, (m, rest) => `${rest}?`],
        [/^What do you like most about (.+)\?$/i, (m, rest) => `${rest} hakkında en çok neyi seviyorsunuz?`],
        [/^What do you enjoy most about (.+)\?$/i, (m, rest) => `${rest} hakkında en çok neyden hoşlanıyorsunuz?`],
        [/^Why do (.+)\?$/i, (m, rest) => `Neden ${rest}?`],
        [/^Why is (.+)\?$/i, (m, rest) => `${rest} neden?`],
        [/^How can (.+)\?$/i, (m, rest) => `${rest} nasıl olabilir?`],
        [/^How do (.+)\?$/i, (m, rest) => `${rest} nasıl?`],
        [/^How has (.+)\?$/i, (m, rest) => `${rest} nasıl değişti?`],
        [/^How have (.+)\?$/i, (m, rest) => `${rest} nasıl değişti?`],
        [/^Should (.+)\?$/i, (m, rest) => `${rest} gerekli mi?`],
        [/^Is it (.+)\?$/i, (m, rest) => `${rest} mı?`],
        [/^Can (.+)\?$/i, (m, rest) => `${rest} mi?`],
      ];

      for (const [pattern, fn] of map) {
        if (pattern.test(t)) {
          return setTranslationEntry(t, fn(...t.match(pattern)), "local");
        }
      }

      return setTranslationEntry(t, t, "local");
    }

    async function requestLiveTranslation(text) {
      const normalized = normalizeWhitespace(text);
      if (!normalized) return "";

      const cached = getTranslationEntry(normalized);
      if (cached && cached.source !== "local") return cached.text;
      if (translationRequests.has(normalized)) return translationRequests.get(normalized);

      const requestPromise = (async () => {
        for (const provider of [fetchGoogleTranslation, fetchMyMemoryTranslation]) {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 6000);
          try {
            const translated = await provider(normalized, controller.signal);
            clearTimeout(timeoutId);
            if (
              translated &&
              normalizeTranslationKey(translated) !== normalizeTranslationKey(normalized)
            ) {
              return setTranslationEntry(normalized, translated, "remote");
            }
          } catch (error) {
            clearTimeout(timeoutId);
          }
        }

        return getImmediateTranslation(normalized);
      })().finally(() => {
        translationRequests.delete(normalized);
      });

      translationRequests.set(normalized, requestPromise);
      return requestPromise;
    }

    function hydrateTranslationNode(node, sourceText, explicitTranslation = "") {
      if (!node) return;
      const normalizedSource = normalizeWhitespace(sourceText);

      if (!normalizedSource) {
        node.textContent = "";
        return;
      }

      node.dataset.translateSource = normalizedSource;

      if (explicitTranslation) {
        node.textContent = rememberProvidedTranslation(normalizedSource, explicitTranslation);
        return;
      }

      node.textContent = getImmediateTranslation(normalizedSource);

      requestLiveTranslation(normalizedSource).then((translated) => {
        if (!translated || node.dataset.translateSource !== normalizedSource) return;
        node.textContent = translated;
      });
    }

    function hydrateTranslationTargets(container) {
      if (!container) return;
      container.querySelectorAll("[data-translate-source]").forEach((node) => {
        hydrateTranslationNode(node, node.dataset.translateSource);
      });
    }

    function spin() {
      if (!ieltsBank) return;
      if (isSpinning || items.length <= 1) return;

      isSpinning = true;
      activeTab = null;
      resetTimer();

      els.spinBtn.disabled = true;
      els.spinIcon.classList.add("fa-spin");
      els.currentArea.classList.add("spin-blur");
      els.currentArea.classList.replace("bg-transparent", "bg-slate-50");
      els.currentArea.classList.add("dark:bg-slate-800/20");
      renderSupportDrawer(null);

      let duration = 1200;
      let startT = performance.now();
      let lastUpdate = startT;
      let currentDelay = 40;

      function animate(time) {
        const elapsed = time - startT;

        if (elapsed > duration) {
          let newIndex = Math.floor(Math.random() * items.length);
          let attempts = 0;

          while (historyIndices.includes(newIndex) && attempts < 10) {
            newIndex = Math.floor(Math.random() * items.length);
            attempts++;
          }

          isSpinning = false;
          currentIndex = newIndex;
          historyIndices.unshift(newIndex);
          if (historyIndices.length > 5) historyIndices.pop();

          els.spinBtn.disabled = false;
          els.spinIcon.classList.remove("fa-spin");
          els.currentArea.classList.remove("spin-blur");
          els.currentArea.classList.replace("bg-slate-50", "bg-transparent");
          els.currentArea.classList.remove("dark:bg-slate-800/20");

          renderSpinArea();
          return;
        }

        if (time - lastUpdate > currentDelay) {
          currentIndex = (currentIndex + 1) % items.length;
          lastUpdate = time;
          currentDelay = 40 + (elapsed / duration) * 100;
          renderSpinArea();
        }

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    }

        els.timerText.classList.add("text-rose-500", "animate-pulse");
        els.timerText.classList.remove(
          "text-indigo-600",
          "dark:text-indigo-400",
          "text-slate-800",
          "dark:text-white"
        );
      } else if (timerInitial > 0 && timerSeconds > 0) {
        els.timerText.classList.remove(
          "text-rose-500",
          "animate-pulse",
          "text-slate-800",
          "dark:text-white"
        );
        els.timerText.classList.add("text-indigo-600", "dark:text-indigo-400");
      } else {
        els.timerText.classList.remove(
          "text-rose-500",
          "animate-pulse",
          "text-indigo-600",
          "dark:text-indigo-400"
        );
        els.timerText.classList.add("text-slate-800", "dark:text-white");
      }

      const progress =
        timerInitial > 0 ? ((timerInitial - timerSeconds) / timerInitial) * 100 : 0;
      const offset = (progress / 100) * CIRCUMFERENCE;
      els.timerRing.style.strokeDashoffset = CIRCUMFERENCE - offset;

      els.timerPlayBtn.disabled = timerInitial === 0 || timerSeconds === 0;
      els.timerResetBtn.disabled = timerInitial === 0;
      els.timerPlayIcon.className = isTimerRunning
        ? "fas fa-pause text-sm"
        : "fas fa-play text-sm";

      els.presetBtns.forEach((btn) => {
        const val = parseInt(btn.dataset.time, 10);

        if (timerInitial === val) {
          btn.className =
            "timer-preset-btn px-4 py-2 rounded-full text-xs font-bold transition-all border shadow-sm active:scale-95 bg-indigo-600 text-white border-indigo-600";
        } else {
          btn.className =
            "timer-preset-btn px-4 py-2 rounded-full text-xs font-bold transition-all border shadow-sm active:scale-95 bg-white text-slate-600 border-slate-200 hover:bg-slate-50 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
        }
      });
    }

    function timerTick() {
      if (isTimerRunning && timerSeconds > 0) {
        timerSeconds--;
        updateTimerUI();
      } else if (isTimerRunning && timerSeconds === 0) {
        isTimerRunning = false;
        clearInterval(timerInterval);
        updateTimerUI();
      }
    }

    function startTimer() {
      if (timerSeconds > 0) {
        isTimerRunning = true;
        clearInterval(timerInterval);
        timerInterval = setInterval(timerTick, 1000);
        updateTimerUI();
      }
    }

    function pauseTimer() {
      isTimerRunning = false;
      clearInterval(timerInterval);
      updateTimerUI();
    }

    function resetTimer() {
      pauseTimer();
      timerSeconds = timerInitial;
      updateTimerUI();
    }

    function setPreset(secs) {
      pauseTimer();
      timerInitial = secs;
      timerSeconds = secs;
      startTimer();
    }

    // ========================================================================
    // 13) FILTER CHANGE
    // ========================================================================
    function setFilterState(id, value) {
      if (id === "partMode") partMode = value;
      if (id === "filterTheme") filterTheme = value;
      if (id === "filterFrequency") filterFrequency = value;
      if (id === "filterDifficulty") filterDifficulty = value;
    }

    // ========================================================================
    // 14) EVENTS
    // ========================================================================
    ["partMode", "filterTheme", "filterFrequency", "filterDifficulty"].forEach((id) => {
      document.getElementById(id).addEventListener("change", (e) => {
        setFilterState(id, e.target.value);
        if (id === "partMode") updateThemeOptions();
        applyFilters();
      });
    });

    els.spinBtn.addEventListener("click", spin);

    els.timerPlayBtn.addEventListener("click", () => {
      isTimerRunning ? pauseTimer() : startTimer();
    });

    els.timerResetBtn.addEventListener("click", resetTimer);

    els.presetBtns.forEach((btn) => {
      btn.addEventListener("click", (e) => {
        setPreset(parseInt(e.currentTarget.dataset.time, 10));
      });
    });

    // ========================================================================
    // 15) BOOTSTRAP
    // ========================================================================
    async function bootstrap() {
      restoreTranslationCache();
      applyTheme();
      setLoadingState(true);

      els.currentLabel.classList.add("hidden");
      els.currentText.innerText = "Loading full question bank...";
      els.currentTextTr.innerText = "Loading full question bank...";
      els.prevItemText.innerText = "Loading...";
      els.nextItemText.innerText = "Loading...";

      try {
        loadIeltsBank();
        updateThemeOptions();
        applyFilters();
      } catch (error) {
        console.error(error);
        els.currentText.innerText = "The full question bank could not be loaded.";
        els.currentTextTr.innerText = "Soru bankası yüklenemedi.";
        els.prevItemText.innerText = "Load error";
        els.nextItemText.innerText = "Load error";
      } finally {
        setLoadingState(false);
        updateTimerUI();
      }
    }

    bootstrap();
  </script>
</body>
</html>
